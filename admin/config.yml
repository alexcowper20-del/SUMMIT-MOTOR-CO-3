backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "stock"
    label: "Stock Vehicles"
    folder: "_stock"
    create: true
    slug: "{{year}}-{{make}}-{{model}}-{{slug}}"
    fields:
      - {label: "ID", name: "id", widget: "number", required: true}
      - {label: "Make", name: "make", widget: "string", required: true}
      - {label: "Model", name: "model", widget: "string", required: true}
      - {label: "Variant", name: "variant", widget: "string", required: false}
      - {label: "Year", name: "year", widget: "number", required: true}
      - {label: "Price (£)", name: "price", widget: "number", required: true}
      - {label: "Price Note (e.g. +VAT)", name: "priceNote", widget: "string", required: false}
      - {label: "Mileage", name: "mileage", widget: "number", required: true}
      - {label: "Fuel Type", name: "fuel", widget: "select", options: ["Petrol","Diesel","Hybrid","Electric"], required: true}
      - {label: "Transmission", name: "transmission", widget: "select", options: ["Auto","Manual"], required: true}
      - {label: "Colour", name: "colour", widget: "string", required: true}
      - {label: "Engine", name: "engine", widget: "string", required: false}
      - {label: "CO2", name: "co2", widget: "string", required: false}
      - {label: "Road Tax", name: "roadTax", widget: "string", required: false}
      - {label: "Category", name: "category", widget: "string", required: false}
      - {label: "Badge (e.g. Low Mileage)", name: "badge", widget: "string", required: false}
      - {label: "Sold?", name: "sold", widget: "boolean", default: false}
      - {label: "Description", name: "description", widget: "text", required: false}
      - label: "Images"
        name: "images"
        widget: "list"
        field: {label: "Image URL", name: "url", widget: "image"}
